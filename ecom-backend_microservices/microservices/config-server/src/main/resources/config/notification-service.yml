server:
  port: 8087

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/notification_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: notification-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:your-email@gmail.com}
    password: ${MAIL_PASSWORD:your-app-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
        debug: false
    default-encoding: UTF-8
    test-connection: true
    
  thymeleaf:
    cache: true
    mode: HTML
    encoding: UTF-8
    prefix: classpath:/templates/
    suffix: .html

twilio:
  account-sid: ${TWILIO_ACCOUNT_SID:your-account-sid}
  auth-token: ${TWILIO_AUTH_TOKEN:your-auth-token}
  phone-number: ${TWILIO_PHONE_NUMBER:+1234567890}
  enabled: ${TWILIO_ENABLED:false}

notification:
  email:
    from: ${MAIL_FROM:noreply@ecommerce.com}
    from-name: ${MAIL_FROM_NAME:E-Commerce Store}
    reply-to: ${MAIL_REPLY_TO:support@ecommerce.com}
  sms:
    max-length: 160
    retry-attempts: 3
  cleanup:
    days-to-keep: 30
    enabled: true
  retry:
    delay-minutes: 15
    max-attempts: 3

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    hostname: localhost
    prefer-ip-address: true
    
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
      
logging:
  level:
    com.ecommerce.notification: INFO
    org.springframework.mail: INFO
    com.twilio: INFO 