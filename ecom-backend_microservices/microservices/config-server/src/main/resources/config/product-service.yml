server:
  port: 8083

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/product_db
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver
    
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 10000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
    
    elasticsearch:
      cluster-name: docker-cluster
      cluster-nodes: localhost:9200
      repositories:
        enabled: true

jwt:
  secret: ${JWT_SECRET:mySuperSecretKeyForJwtAuthenticationWhichIsAtLeast32BytesLong12345}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    hostname: localhost
    prefer-ip-address: true
    
kafka:
  topics:
    product-events: product-events
    inventory-events: inventory-events
    
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
      
product:
  image:
    upload-dir: ${UPLOAD_DIR:./uploads/products}
    max-size: 5MB
    allowed-types: image/jpeg,image/png,image/gif
    
logging:
  level:
    com.ecommerce.product: DEBUG
    org.springframework.web: DEBUG
    
elasticsearch:
  reindex:
    on-startup: false  # Set to true to reindex all products on startup 