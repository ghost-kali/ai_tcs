server:
  port: 8086

spring:
  application:
    name: payment-service

  cloud:
    config:
      enabled: false
      import-check:
        enabled: false

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:5432/payment_db
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:root}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    hostname: localhost
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: "*"

paypal:
  client-id: ${PAYPAL_CLIENT_ID:AdhRfJrFzpd2KACfbXBSAaP6yra0JeTLMt5Cu_GIOd4SzrLadh1iZGBDbDpIuVdCTeBynhmiGUirG3EQ}
  client-secret: ${PAYPAL_CLIENT_SECRET:ECwMHnlGhv1STn6QKywZwVj33oAhRY0atAXmGMzfARE4O9iDU8WeYf-_XPSgwF-UMKzUAseKghjxMLVQ}
  base-url: ${PAYPAL_BASE_URL:https://api-m.sandbox.paypal.com}
  return-url: ${PAYPAL_RETURN_URL:http://localhost:5173/order-confirm}
  cancel-url: ${PAYPAL_CANCEL_URL:http://localhost:5173/checkout}
  brand-name: ${PAYPAL_BRAND_NAME:E-Commerce Store}
  currency: ${PAYPAL_CURRENCY:USD}

services:
  order-service-url: ${ORDER_SERVICE_URL:http://localhost:8085}

internal:
  token: ${INTERNAL_TOKEN:dev-internal-token}
