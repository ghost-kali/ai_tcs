input {
  # TCP input for JSON logs
  tcp {
    port => 5000
    codec => json_lines
  }
  
  # File input for log files
  file {
    path => "/logs/**/*.log"
    start_position => "beginning"
    codec => multiline {
      pattern => "^%{TIMESTAMP_ISO8601}"
      negate => true
      what => "previous"
    }
  }
  
  # Beats input for Filebeat
  beats {
    port => 5044
  }
}

filter {
  # Parse Spring Boot logs
  if [message] =~ /^\d{4}-\d{2}-\d{2}/ {
    grok {
      match => {
        "message" => "%{TIMESTAMP_ISO8601:timestamp} %{LOGLEVEL:level} \[%{DATA:service},%{DATA:trace_id},%{DATA:span_id}\] %{INT:pid} --- \[%{DATA:thread}\] %{DATA:logger} : %{GREEDYDATA:log_message}"
      }
    }
    
    date {
      match => [ "timestamp", "yyyy-MM-dd HH:mm:ss.SSS" ]
      target => "@timestamp"
    }
  }
  
  # Parse JSON logs
  if [log_format] == "json" {
    json {
      source => "message"
    }
  }
  
  # Add service name from container name or application property
  if ![service] and [container_name] {
    mutate {
      add_field => { "service" => "%{container_name}" }
    }
  }
  
  # Enrich with environment info
  mutate {
    add_field => {
      "environment" => "${ENVIRONMENT:dev}"
      "cluster" => "ecommerce-microservices"
    }
  }
  
  # Parse stack traces
  if [level] == "ERROR" and [log_message] =~ /^.*Exception.*/ {
    mutate {
      add_tag => [ "exception" ]
    }
  }
}

output {
  # Output to Elasticsearch
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "microservices-%{service}-%{+YYYY.MM.dd}"
    template_name => "microservices"
    template => "/usr/share/logstash/templates/microservices-template.json"
    template_overwrite => true
  }
  
  # Debug output to stdout
  stdout {
    codec => rubydebug
  }
} 